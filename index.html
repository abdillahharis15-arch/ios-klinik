<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- base href: pastikan semua path CSS/JS resolve dari root meski URL /admin/* -->
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IOS - Informasi Obat dan Kesehatan, sistem informasi digital Klinik Pratama Kelas I Palembang" />
  <title>IOS — Informasi Obat & Kesehatan | Klinik Pratama Kelas I Palembang</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- SPA Redirect Handler: pulihkan URL dari 404.html redirect trick -->
  <!-- Ini diperlukan agar Live Server + GitHub Pages support clean URL -->
  <script>
    (function() {
      var redirect = sessionStorage.getItem('ios_spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('ios_spa_redirect');
        window.history.replaceState(null, '', redirect);
      }
    })();
  </script>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <i class="ph-fill ph-first-aid-kit"></i>
      </div>
      <div class="logo-text">
        <span class="logo-title">IOS</span>
        <span class="logo-sub">Klinik Pratama Kelas I</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <!-- Nav ini diganti oleh renderSidebarNav() saat JS dimuat.
           href & onclick di sini sebagai fallback tanpa hash. -->
      <a href="/" class="nav-item active" id="nav-welcome"
         onclick="event.preventDefault(); navigate('welcome')">
        <i class="ph-fill ph-house"></i>
        <span>Home</span>
      </a>
      <a href="/obat" class="nav-item" id="nav-obat"
         onclick="event.preventDefault(); navigate('obat')">
        <i class="ph-fill ph-pill"></i>
        <span>Stok Obat</span>
      </a>
      <a href="/pegawai" class="nav-item" id="nav-pegawai"
         onclick="event.preventDefault(); navigate('pegawai')">
        <i class="ph-fill ph-users-three"></i>
        <span>Data Pegawai</span>
      </a>
      <a href="/kesehatan" class="nav-item" id="nav-kesehatan"
         onclick="event.preventDefault(); navigate('kesehatan')">
        <i class="ph-fill ph-heart-pulse"></i>
        <span>Info Kesehatan</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">Admin Klinik</span>
          <span class="user-role">Super Admin</span>
        </div>
        <i class="ph ph-sign-out" style="margin-left:auto;cursor:pointer;opacity:0.6"></i>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <!-- TOPBAR -->
    <div class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        <i class="ph ph-list"></i>
      </button>
      <div class="topbar-center" id="page-title">Dashboard</div>
      <div class="topbar-right">
        <div class="clock-widget" id="clock"></div>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">
          <i class="ph-fill ph-moon" id="darkIcon"></i>
        </button>
        <!-- SYNC STATUS INDICATOR -->
        <div class="sync-status-btn" id="syncStatusBtn" onclick="handleSyncClick()" title="Status Sinkronisasi">
          <i class="ph-fill ph-cloud-slash" style="color:var(--text-muted);font-size:18px"></i>
          <span class="sync-label">Offline</span>
          <span class="sync-queue-badge" id="syncQueueBadge" style="display:none">0</span>
        </div>
        <div class="notification-btn" onclick="toggleNotif()">
          <i class="ph-fill ph-bell"></i>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </div>
        <div class="notif-dropdown" id="notifDropdown">
          <div class="notif-header">
            <span>🔔 Notifikasi Stok Obat</span>
            <button onclick="renderNotif();event.stopPropagation()" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;font-weight:600">Refresh</button>
          </div>
          <div id="notifList">
            <div class="notif-empty"><i class="ph ph-check-circle"></i> Semua stok dalam kondisi baik</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGES -->
    <div class="page-container" id="page-container">
      <!-- Content rendered by JS -->
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModal()"><i class="ph ph-x"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/sync.js?v=20260606"></script>
  <script src="js/data.js?v=20260606"></script>
  <script src="js/app.js?v=20260606"></script>
</body>
</html>
